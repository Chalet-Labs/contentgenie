name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build Storybook
        run: bun run build-storybook

      - name: Cache Playwright Chromium
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Serve Storybook and run VRT
        run: |
          bunx serve storybook-static -p 6006 &
          SERVE_PID=$!
          trap "kill $SERVE_PID 2>/dev/null || true" EXIT
          if ! timeout 60 bash -c 'until curl -sf http://localhost:6006 > /dev/null; do sleep 1; done'; then
            echo "::error::Storybook did not become available on port 6006 within 60s"
            exit 1
          fi
          bunx playwright test --config playwright.vrt.config.ts

      - name: Upload VRT diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vrt-diff-screenshots
          path: test-results/
          retention-days: 7

      - name: Validate Trigger.dev tasks (dry-run)
        if: github.event_name == 'pull_request'
        run: bunx trigger.dev@4.4.1 deploy --dry-run --skip-sync-env-vars
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}

  schema-drift:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate production database secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL_PRODUCTION secret not configured"
            exit 1
          fi

      - name: Check for schema drift against production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: bash scripts/check-schema-drift.sh
