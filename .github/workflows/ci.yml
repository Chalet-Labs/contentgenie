name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build Storybook
        run: bun run build-storybook

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Serve Storybook and run VRT
        run: |
          npx serve storybook-static -p 6006 &
          SERVE_PID=$!
          trap "kill $SERVE_PID" EXIT
          timeout 60 bash -c 'until curl -sf http://localhost:6006 > /dev/null; do sleep 1; done'
          npx playwright test --config playwright.vrt.config.ts

      - name: Upload VRT diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff-screenshots
          path: tests/visual/__screenshots__/
          retention-days: 7

      - name: Validate Trigger.dev tasks (dry-run)
        if: github.event_name == 'pull_request'
        run: bunx trigger.dev@4.4.1 deploy --dry-run --skip-sync-env-vars
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}

  schema-drift:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate production database secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL_PRODUCTION secret not configured"
            exit 1
          fi

      - name: Check for schema drift against production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: bash scripts/check-schema-drift.sh
